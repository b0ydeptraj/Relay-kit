commands:
  dashboard:
    handler: relay_kit_v3.cli.dashboard.run_dashboard
    help_text: Start Relay-Kit Live Dashboard
    args:
      project_path:
        nargs: '?'
        default: .
        help: Project root to inspect
    flags:
      --host:
        type: str
        default: 127.0.0.1
        help: Host to bind
      --port:
        type: int
        default: 8000
        help: Port to bind
  doctor:
    handler: relay_kit_v3.cli.doctor.run_doctor
    help_text: Run Relay-kit runtime verification gates.
    args:
      project_path:
        nargs: '?'
        default: .
        help: Project root to inspect
    flags:
      --skip-tests:
        action: store_true
        help: Skip the local pytest suite
      --policy-pack:
        help: Policy pack passed to policy guard
        choices:
        - baseline
        - enterprise
        - team
      --verbose:
        action: store_true
        help: Print stdout and stderr for passing gates
      --json:
        action: store_true
        help: Emit machine-readable doctor results
  evidence:
    handler: relay_kit_v3.cli.evidence.run_evidence
    help_text: Inspect Relay-kit evidence ledger events.
    subcommands:
      summary:
        handler: relay_kit_v3.cli.evidence.run_evidence
        help_text: Summarize recent evidence events
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --limit:
            type: int
            default: 20
            help: Recent event count to show
          --json:
            action: store_true
            help: Emit JSON summary
  contract:
    handler: relay_kit_v3.cli.contract.run_contract
    help_text: Export and import Relay-kit planning and QA contracts as machine-readable
      contract JSON.
    subcommands:
      export:
        handler: relay_kit_v3.cli.contract.run_contract_export
        help_text: Export Relay-kit contracts to JSON
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --output-file:
            default: null
            help: 'Output path (default: <project>/.relay-kit/contract-sync/relay-contract.json)'
      import:
        handler: relay_kit_v3.cli.contract.run_contract_import
        help_text: Plan or apply Relay contract JSON into contracts
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to update
        flags:
          --contract-file:
            default: null
            help: 'Input contract JSON path (default: <project>/.relay-kit/contract-sync/relay-contract.json)'
          --apply:
            action: store_true
            help: Write contract updates instead of dry-running
          --force:
            action: store_true
            help: Overwrite concrete existing contract sections
          --strict:
            action: store_true
            help: Return non-zero on invalid contract JSON or skipped conflicts
          --json:
            action: store_true
            help: Emit machine-readable import report
  context:
    handler: relay_kit_v3.cli.context.run_context
    help_text: Audit Relay-kit context governance and build a local no-API context
      graph.
    subcommands:
      audit:
        handler: relay_kit_v3.cli.context.run_context
        help_text: Audit source freshness and authority
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --stale-days:
            type: int
            default: 30
            help: Age threshold for stale sources
          --output-file:
            default: null
            help: Optional context audit JSON output path
          --strict:
            action: store_true
            help: Return non-zero unless context audit passes
          --json:
            action: store_true
            help: Emit machine-readable context audit
      index:
        handler: relay_kit_v3.cli.context.run_context
        help_text: Build a local file, symbol, import, test, and docs index
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to index
        flags:
          --output-file:
            default: null
            help: 'Optional index JSON output path (default: <project>/.relay-kit/context/index.json)'
          --json:
            action: store_true
            help: Emit machine-readable context index summary
      search:
        handler: relay_kit_v3.cli.context.run_context
        help_text: Search the local context graph
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --query:
            required: true
            help: Query text
          --limit:
            type: int
            default: 10
            help: Maximum result count
          --index-file:
            default: null
            help: Optional context index JSON path
          --embedding-model:
            default: null
            help: 'Force Tier 1/2 embedding model (e.g., nomic-embed-text-v1.5, bge-m3)'
          --json:
            action: store_true
            help: Emit machine-readable search results
      related:
        handler: relay_kit_v3.cli.context.run_context
        help_text: Find files related to a path in the local context graph
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --path:
            required: true
            help: Source path to inspect
          --limit:
            type: int
            default: 10
            help: Maximum related file count
          --index-file:
            default: null
            help: Optional context index JSON path
          --json:
            action: store_true
            help: Emit machine-readable related-file results
      explain-symbol:
        handler: relay_kit_v3.cli.context.run_context
        help_text: Explain definitions, references, and tests for a symbol
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --symbol:
            required: true
            help: Symbol name to explain
          --limit:
            type: int
            default: 10
            help: Maximum definition/reference count
          --index-file:
            default: null
            help: Optional context index JSON path
          --json:
            action: store_true
            help: Emit machine-readable symbol explanation
      active:
        handler: relay_kit_v3.cli.context.run_context
        help_text: Set or show active file/selection context
        subcommands:
          set:
            handler: relay_kit_v3.cli.context.run_context
            help_text: Set active context
            args:
              project_path:
                nargs: '?'
                default: .
                help: Project root to inspect
            flags:
              --file:
                required: true
                help: Active file path
              --selection:
                default: null
                help: Optional active selection text
              --json:
                action: store_true
                help: Emit machine-readable active context
          show:
            handler: relay_kit_v3.cli.context.run_context
            help_text: Show active context
            args:
              project_path:
                nargs: '?'
                default: .
                help: Project root to inspect
            flags:
              --json:
                action: store_true
                help: Emit machine-readable active context
      mcp:
        handler: relay_kit_v3.cli.context.run_context
        help_text: Expose local context tools for MCP-style clients
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --list-tools:
            action: store_true
            help: Print local context tool manifest and exit
          --tool:
            choices:
            - context.search
            - context.related
            - context.explain_symbol
            - context.active
            default: null
          --query:
            default: null
            help: Query for context.search
          --path:
            default: null
            help: Path for context.related
          --symbol:
            default: null
            help: Symbol for context.explain_symbol
          --limit:
            type: int
            default: 10
            help: Tool result limit
          --json:
            action: store_true
            help: Emit machine-readable MCP manifest or tool result
      watch:
        handler: relay_kit_v3.cli.context.run_context
        help_text: Refresh the local context index when indexed files change
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to watch
        flags:
          --output-file:
            default: null
            help: Optional index JSON output path
          --once:
            action: store_true
            help: Build once and exit
          --interval:
            default: 2.0
            help: Polling interval in seconds
          --max-iterations:
            type: int
            default: null
            help: Stop after N polling iterations
          --json:
            action: store_true
            help: Emit machine-readable watch summary
      budget:
        handler: relay_kit_v3.cli.context.run_context
        help_text: Estimate token budget and compression safety
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --max-tokens:
            type: int
            help: Token budget ceiling
          --query:
            default: null
            help: Optional query text to focus context budget sources
          --scope:
            action: append
            choices:
            - state
            - contracts
            - docs
            - evidence
            - registry
            help: Limit source scopes; defaults to all scopes
          --stale-days:
            type: int
            default: 30
            help: Age threshold for stale sources
          --output-file:
            default: null
            help: Optional context budget JSON output path
          --strict:
            action: store_true
            help: Return non-zero unless budget and retention pass
          --json:
            action: store_true
            help: Emit machine-readable context budget
      pack:
        handler: relay_kit_v3.cli.context.run_context
        help_text: Build task-scoped context pack within token budget
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --task:
            required: true
            help: Task text used to rank relevant context sources
          --max-tokens:
            type: int
            help: Token budget ceiling
          --scope:
            action: append
            choices:
            - state
            - contracts
            - docs
            - evidence
            - registry
            help: Limit source scopes; defaults to all scopes
          --stale-days:
            type: int
            default: 30
            help: Age threshold for stale sources
          --output-file:
            default: null
            help: Optional context pack JSON output path
          --strict:
            action: store_true
            help: Return non-zero unless budget and retention pass
          --json:
            action: store_true
            help: Emit machine-readable context pack
  lane:
    handler: relay_kit_v3.cli.lane.run_lane
    help_text: Audit Relay-kit multi-lane coordination state.
    subcommands:
      audit:
        handler: relay_kit_v3.cli.lane.run_lane
        help_text: Audit lane locks, dependencies, waves, and handoffs
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --output-file:
            default: null
            help: Optional lane audit JSON output path
          --strict:
            action: store_true
            help: Return non-zero unless lane audit passes
          --json:
            action: store_true
            help: Emit machine-readable lane audit
      simulate:
        handler: relay_kit_v3.cli.lane.run_lane
        help_text: Simulate multi-lane execution before forking
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root
        flags:
          --tasks:
            required: true
            help: Path to tasks.json containing delegation targets
          --agents:
            type: int
            default: 1
            help: Number of agents to simulate
          --json:
            action: store_true
            help: Emit machine-readable output
      run:
        handler: relay_kit_v3.cli.lane.run_lane
        help_text: Run multi-lane execution with lock protection
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root
        flags:
          --tasks:
            required: true
            help: Path to tasks.json containing delegation targets
          --agents:
            type: int
            default: 1
            help: Number of agents to run
          --json:
            action: store_true
            help: Emit machine-readable output
  delegation:
    handler: relay_kit_v3.cli.delegation.run_delegation
    help_text: Plan and audit quota-aware subagent delegation.
    subcommands:
      plan:
        handler: relay_kit_v3.cli.delegation.run_delegation
        help_text: Plan bounded delegation with reasoning and quota controls
        args:
          project_path:
            nargs: '?'
            default: .
        flags:
          --task:
            required: true
          --budget:
            type: int
            default: null
          --complexity:
            choices:
            - L0
            - L1
            - L2
            - L3
            - L4
            default: null
          --adapter:
            choices:
            - codex
            - claude
            - agent
            - antigravity
            - all
            default: all
          --artifact:
            default: null
          --lock-scope:
            default: null
          --expected-return-condition:
            default: null
          --verification-command:
            default: null
          --independent:
            action: store_true
          --apply:
            action: store_true
          --strict:
            action: store_true
          --json:
            action: store_true
      audit:
        handler: relay_kit_v3.cli.delegation.run_delegation
        help_text: Audit delegation quota and lifecycle state
        args:
          project_path:
            nargs: '?'
            default: .
        flags:
          --strict:
            action: store_true
          --json:
            action: store_true
      close-completed:
        handler: relay_kit_v3.cli.delegation.run_delegation
        help_text: Close agents with recorded handoff evidence
        args:
          project_path:
            nargs: '?'
            default: .
        flags:
          --json:
            action: store_true
      record-usage:
        handler: relay_kit_v3.cli.delegation.run_delegation
        help_text: Record adapter-reported token usage
        args:
          project_path:
            nargs: '?'
            default: .
        flags:
          --agent-id:
            required: true
          --input-tokens:
            required: true
            type: int
          --output-tokens:
            required: true
            type: int
          --json:
            action: store_true
      capabilities:
        handler: relay_kit_v3.cli.delegation.run_delegation
        help_text: Report adapter delegation capability enforcement
        args:
          project_path:
            nargs: '?'
            default: .
        flags:
          --adapter:
            choices:
            - codex
            - claude
            - agent
            - antigravity
            - all
            default: all
          --json:
            action: store_true
  locale:
    handler: relay_kit_v3.cli.locale.run_locale
    help_text: Read or update Relay-kit global runtime locale policy.
    subcommands:
      show:
        handler: relay_kit_v3.cli.locale.run_locale
        help_text: Show the current runtime locale policy
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --json:
            action: store_true
            help: Emit machine-readable locale policy
      set:
        handler: relay_kit_v3.cli.locale.run_locale
        help_text: Set runtime locale policy with one global switch
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to update
        flags:
          --locale:
            required: true
            help: 'Primary locale profile (allowed: vi, en)'
          --fallback-locale:
            default: null
            help: Fallback locale profile (default unchanged)
          --enforce-output-language:
            dest: enforce_output_language
            action: store_true
            help: Enforce output language according to locale profile (default on).
          --no-enforce-output-language:
            dest: enforce_output_language
            action: store_false
            help: Allow mixed-language output when explicitly needed.
          --json:
            action: store_true
            help: Emit machine-readable locale policy
  token:
    handler: relay_kit_v3.cli.token.run_token
    help_text: Audit token-economy metrics for context budget and compression safety.
    subcommands:
      audit:
        handler: relay_kit_v3.cli.token.run_token
        help_text: Run token-economy audit
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --max-tokens:
            type: int
            help: Token budget ceiling
          --scope:
            action: append
            choices:
            - state
            - contracts
            - docs
            - evidence
            - registry
            help: Limit source scopes; defaults to all scopes
          --stale-days:
            type: int
            default: 30
            help: Age threshold for stale sources
          --output-file:
            default: null
            help: Optional token audit JSON output path
          --strict:
            action: store_true
            help: Return non-zero unless budget and retention pass
          --json:
            action: store_true
            help: Emit machine-readable token audit
  calibrate:
    handler: relay_kit_v3.cli.calibrate.run_calibrate
    help_text: Calibrate overclaim-prone Relay-kit claims against proof evidence.
    subcommands:
      claims:
        handler: relay_kit_v3.cli.calibrate.run_calibrate
        help_text: Calibrate explicit claim text
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --claim:
            action: append
            help: Exact claim text to calibrate
          --claim-file:
            default: null
            help: JSON, markdown, or text file with claims
          --output-file:
            default: null
            help: Optional signal calibration JSON output path
          --strict:
            action: store_true
            help: Return non-zero when a claim is blocked
          --json:
            action: store_true
            help: Emit machine-readable signal calibration report
      skill:
        handler: relay_kit_v3.cli.calibrate.run_calibrate
        help_text: Calibrate skill quality claims
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --skill:
            default: all
            help: Skill name or all
          --output-file:
            default: null
            help: Optional signal calibration JSON output path
          --strict:
            action: store_true
            help: Return non-zero when a claim is blocked
          --json:
            action: store_true
            help: Emit machine-readable signal calibration report
      readiness:
        handler: relay_kit_v3.cli.calibrate.run_calibrate
        help_text: Calibrate readiness and public proof claims
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --output-file:
            default: null
            help: Optional signal calibration JSON output path
          --strict:
            action: store_true
            help: Return non-zero when a claim is blocked
          --json:
            action: store_true
            help: Emit machine-readable signal calibration report
  shell:
    handler: relay_kit_v3.cli.shell.run_shell
    help_text: Run shell commands through Relay-kit raw-log preserving compaction.
    subcommands:
      compact:
        handler: relay_kit_v3.cli.shell.run_shell
        help_text: Run a command and compact its shell output
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root used for raw evidence logs
        flags:
          --cwd:
            default: null
            help: Working directory for the command; defaults to project root
          --timeout:
            default: null
            help: Optional command timeout in seconds
          --strict:
            action: store_true
            help: Fail if compaction drops required signal
          --json:
            action: store_true
            help: Emit machine-readable compact shell report
  adapter:
    handler: relay_kit_v3.cli.adapter.run_adapter
    help_text: Diagnose Relay-kit adapter skill surfaces.
    subcommands:
      diagnose:
        handler: relay_kit_v3.cli.adapter.run_adapter
        help_text: Check adapter skill parity and metadata drift
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --adapter:
            choices:
            - codex
            - claude
            - agent
            - antigravity
            - all
            default: all
            help: Adapter surface to inspect
          --output-file:
            default: null
            help: Optional adapter diagnostics JSON output path
          --strict:
            action: store_true
            help: Return non-zero unless diagnostics pass
          --json:
            action: store_true
            help: Emit machine-readable diagnostics
  command:
    handler: relay_kit_v3.cli.command.run_command
    help_text: List and diagnose Relay-kit lifecycle command surfaces.
    subcommands:
      list:
        handler: relay_kit_v3.cli.command.run_command
        help_text: List lifecycle commands and route targets
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root (reserved for CLI symmetry)
        flags:
          --json:
            action: store_true
            help: Emit machine-readable lifecycle command list
      diagnose:
        handler: relay_kit_v3.cli.command.run_command
        help_text: Check adapter lifecycle command parity
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --adapter:
            choices:
            - codex
            - claude
            - agent
            - antigravity
            - all
            default: all
            help: Adapter surface to inspect
          --output-file:
            default: null
            help: Optional command diagnostics JSON output path
          --strict:
            action: store_true
            help: Return non-zero unless command parity passes
          --json:
            action: store_true
            help: Emit machine-readable command diagnostics
  agent:
    handler: relay_kit_v3.cli.agent.run_agent
    help_text: List and diagnose Relay-kit role-based agent profiles.
    subcommands:
      list:
        handler: relay_kit_v3.cli.agent.run_agent
        help_text: List Relay-kit agent profiles and route contracts
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root (reserved for CLI symmetry)
        flags:
          --json:
            action: store_true
            help: Emit machine-readable agent profile list
      diagnose:
        handler: relay_kit_v3.cli.agent.run_agent
        help_text: Check adapter agent profile parity and contract integrity
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --adapter:
            choices:
            - codex
            - claude
            - agent
            - antigravity
            - all
            default: all
            help: Adapter surface to inspect
          --output-file:
            default: null
            help: Optional agent diagnostics JSON output path
          --strict:
            action: store_true
            help: Return non-zero unless agent diagnostics pass
          --json:
            action: store_true
            help: Emit machine-readable agent diagnostics
  query:
    handler: relay_kit_v3.cli.query.run_query
    help_text: Search Relay-kit state, contracts, docs, evidence, and registry sources.
    subcommands:
      search:
        handler: relay_kit_v3.cli.query.run_query
        help_text: Rank local Relay-kit sources for a query
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --query:
            required: true
            help: Query text
          --scope:
            action: append
            choices:
            - state
            - contracts
            - docs
            - evidence
            - registry
            help: Limit search to one or more scopes; defaults to all scopes
          --limit:
            type: int
            default: 10
            help: Maximum result count
          --stale-days:
            type: int
            default: 30
            help: Freshness threshold in days
          --output-file:
            default: null
            help: Optional query search JSON output path
          --json:
            action: store_true
            help: Emit machine-readable search results
  prompt:
    handler: relay_kit_v3.cli.prompt.run_prompt
    help_text: Enhance short or ambiguous user prompts with Relay-kit skill context.
    subcommands:
      enhance:
        handler: relay_kit_v3.cli.prompt.run_prompt
        help_text: Turn a short request into a skill-aware working prompt
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --prompt:
            required: true
            help: User prompt to enhance
          --top-limit:
            type: int
            default: 5
            help: Number of route candidates to include
          --output-file:
            default: null
            help: Optional prompt enhancement JSON output path
          --json:
            action: store_true
            help: Emit machine-readable prompt enhancement
  service:
    handler: relay_kit_v3.cli.service.run_service
    help_text: Inspect Relay-kit service-boundary map and static dependency rules.
    subcommands:
      boundaries:
        handler: relay_kit_v3.cli.service.run_service
        help_text: Check service-boundary map and static import rules
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --output-file:
            default: null
            help: Optional service-boundary JSON output path
          --strict:
            action: store_true
            help: Return non-zero when boundary findings exist
          --json:
            action: store_true
            help: Emit machine-readable boundary report
  runtime:
    handler: relay_kit_v3.cli.runtime.run_runtime
    help_text: Run Relay-kit runtime diagnostics through portable public commands.
    subcommands:
      doctor:
        handler: relay_kit_v3.cli.runtime.run_runtime
        help_text: Detect runtime drift in generated skill surfaces
        args:
          project_path:
            nargs: '?'
            default: .
            help: Project root to inspect
        flags:
          --state-mode:
            choices:
            - template
            - live
